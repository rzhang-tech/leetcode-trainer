{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div class="max-w-sm mx-auto mt-20 p-6 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">
  <h1 class="text-lg font-semibold mb-1" data-i18n="login.title">📚 LeetCode Trainer</h1>
  <p class="text-sm text-zinc-500 mb-4" data-i18n="login.subtitle">Sign in to continue</p>
  {% if err %}
    <div class="mb-3 text-sm text-rose-500">
      {% if err == 'bad_credentials' %}<span data-i18n="login.errBadCreds">Wrong email or password.</span>
      {% else %}<span>{{ err }}</span>
      {% endif %}
    </div>
  {% endif %}
  <form method="post" action="/login" class="space-y-3">
    <div>
      <label class="block text-xs text-zinc-500 mb-1" data-i18n="login.email">Email</label>
      <input type="email" name="email" required autocomplete="email" autofocus
             class="w-full px-3 py-2 rounded-md bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700">
    </div>
    <div>
      <label class="block text-xs text-zinc-500 mb-1" data-i18n="login.password">Password</label>
      <input type="password" name="password" required autocomplete="current-password" minlength="6"
             class="w-full px-3 py-2 rounded-md bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700">
    </div>
    <button class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-md" data-i18n="login.submit">Sign in</button>
  </form>
  <p class="mt-4 text-sm text-zinc-500 text-center">
    <span data-i18n="login.noAccount">Don't have an account?</span>
    <a href="/register" class="text-blue-500 hover:underline ml-1" data-i18n="login.register">Sign up</a>
  </p>
</div>
{% endblock %}
