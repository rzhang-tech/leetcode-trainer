{% extends "base.html" %}
{% block title %}Today's Review{% endblock %}
{% block body %}
<div class="flex flex-wrap items-end gap-3 mb-5">
  <h1 class="text-2xl font-bold" data-i18n="today.title">Today's Review</h1>
  <div id="header-stats" class="text-sm text-zinc-500 dark:text-zinc-400" data-i18n="today.statsLoading">Loading…</div>
</div>
<div id="today-list" class="space-y-3"></div>
<div id="empty" class="hidden text-center py-16 text-zinc-500">
  <span data-i18n="today.empty">🎉 No cards due today. Go </span>
  <a href="/add" class="text-blue-600 dark:text-blue-400 hover:underline" data-i18n="today.emptyAddLink">add a new problem</a>
  <span data-i18n="today.emptyOrRest"> or take a break.</span>
</div>
{% endblock %}
{% block scripts %}
<script>
async function load() {
  let data;
  try { data = await LT.api('/api/today'); }
  catch (e) { return LT.showToast('Failed to load: ' + e.message, 'error'); }

  document.getElementById('header-stats').textContent =
    LT.t('today.stats', { due: data.due_count, done: data.completed_count });

  const list = document.getElementById('today-list');
  list.innerHTML = '';
  if (!data.groups.length) {
    document.getElementById('empty').classList.remove('hidden');
    return;
  }
  document.getElementById('empty').classList.add('hidden');
  for (const g of data.groups) list.appendChild(renderGroup(g));
}

function renderGroup(g) {
  const a = document.createElement('a');
  a.href = `/review/${g.problem.id}`;
  a.className = 'flex flex-wrap items-center gap-3 p-4 border border-zinc-200 dark:border-zinc-800 rounded-lg bg-white dark:bg-zinc-900 hover:bg-zinc-50 dark:hover:bg-zinc-800/40';
  const tags = (g.problem.tags || [])
    .map(t => `<span class="text-xs px-1.5 py-0.5 bg-zinc-200 dark:bg-zinc-800 rounded">${LT.escapeHtml(t)}</span>`)
    .join(' ');
  const right = g.needs_generation
    ? `<span class="text-xs px-2 py-0.5 rounded bg-purple-500/15 text-purple-600 dark:text-purple-300">${LT.escapeHtml(LT.t('today.needsGen'))}</span>`
    : `<span class="text-xs px-2 py-0.5 rounded bg-blue-500/15 text-blue-600 dark:text-blue-300">${LT.escapeHtml(LT.t('today.dueCards', { n: g.due_count }))}</span>`;
  a.innerHTML = `
    <div class="font-mono text-sm text-zinc-500">#${g.problem.lc_number}</div>
    <div class="font-semibold flex-1 min-w-[180px]">${LT.escapeHtml(g.problem.title)}</div>
    ${LT.diffBadge(g.problem.difficulty)}
    <div class="flex flex-wrap gap-1 basis-full sm:basis-auto">${tags}</div>
    <div class="ml-auto">${right}</div>`;
  return a;
}

window.addEventListener('langchange', load);
load();
</script>
{% endblock %}
